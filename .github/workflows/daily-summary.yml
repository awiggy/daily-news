name: Daily News Summary

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Setup config
        run: cp data/config.production.json data/config.json

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon

      - name: Commit & push summaries
        run: |
          git config user.name "Horizon Bot"
          git config user.email "bot@horizon.daily"
          git add data/summaries/ docs/_posts/
          git diff --staged --quiet || (git commit -m "Daily: $(date +%Y-%m-%d)" && git push)
